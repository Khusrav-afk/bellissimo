<!DOCTYPE html>
<html>
<head>
  <title>Перенос фото в Cloudinary</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f8f4f1; }
    h1 { color: #3a2f2b; font-size: 24px; }
    button { padding: 14px 28px; background: linear-gradient(135deg,#c9748a,#a55570); color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #log { margin-top: 20px; background: #fff; border-radius: 10px; padding: 16px; min-height: 100px; font-family: monospace; font-size: 13px; white-space: pre-wrap; border: 1px solid #ede4dc; }
    .ok { color: #3a7a3a; }
    .err { color: #c45c5c; }
  </style>
</head>
<body>
  <h1>🌹 Перенос фото в Cloudinary</h1>
  <p>Нажми кнопку — скрипт перенесёт все фото из старого Supabase в Cloudinary автоматически.</p>
  <p id="progress" style="font-weight:700; color:#c9748a;">Готов к запуску</p>
  <button id="btn" onclick="startMigration()">▶ Начать перенос</button>
  <div id="log">Нажмите кнопку чтобы начать...</div>

  <script>
    let offset = 0
    let totalMigrated = 0
    const BATCH = 5

    function log(msg, type='') {
      const el = document.getElementById('log')
      el.innerHTML += `<span class="${type}">${msg}\n</span>`
      el.scrollTop = el.scrollHeight
    }

    async function startMigration() {
      document.getElementById('btn').disabled = true
      document.getElementById('log').innerHTML = ''
      offset = 0
      totalMigrated = 0
      log('🚀 Начинаем перенос фото...')
      await runBatch()
    }

    async function runBatch() {
      try {
        document.getElementById('progress').textContent = `Обработано: ${totalMigrated} фото...`
        
        const res = await fetch('/api/migrate-photos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ limit: BATCH, offset })
        })
        const data = await res.json()

        if (data.error) {
          log('❌ Ошибка: ' + data.error, 'err')
          document.getElementById('btn').disabled = false
          return
        }

        totalMigrated += data.migrated
        log(`✅ Партия ${offset}-${offset+BATCH}: перенесено ${data.migrated}`, 'ok')
        
        if (data.errors?.length) {
          data.errors.forEach(e => log(`  ⚠️ ${e.id}: ${e.error}`, 'err'))
        }

        if (data.done) {
          log(`\n🎉 Готово! Всего перенесено: ${totalMigrated} товаров`, 'ok')
          document.getElementById('progress').textContent = `✅ Завершено! Перенесено: ${totalMigrated}`
          document.getElementById('btn').disabled = false
          return
        }

        offset += BATCH
        setTimeout(runBatch, 1000) // Пауза между батчами
      } catch (e) {
        log('❌ Ошибка соединения: ' + e.message, 'err')
        document.getElementById('btn').disabled = false
      }
    }
  </script>
</body>
</html>
